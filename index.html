<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samundra Café | Himalayan Coffee & Kyoto Soul</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #c5a059;
      --dark-charcoal: #1e1e1e;
      --white: #ffffff;
      --bg-warm: #fcfaf7;
      --serif: 'Noto Serif JP', serif;
      --sans: 'Montserrat', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-warm);
      color: var(--dark-charcoal);
      line-height: 1.8;
      font-family: var(--serif);
      overflow-x: hidden;
    }

    .container { width: 90%; max-width: 1100px; margin: 0 auto; }

    /* --- Navigation --- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: rgba(255, 255, 255, 0.98);
      position: fixed;
      top: 0; width: 100%; z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: all 0.4s ease;
    }

    .logo { font-family: var(--sans); font-weight: 600; letter-spacing: 3px; font-size: 1.1rem; }
    .logo span { color: var(--gold); }

    .nav-links { display: flex; list-style: none; gap: 15px; align-items: center; }
    
    .nav-links a {
      text-decoration: none;
      color: var(--dark-charcoal);
      font-size: 0.75rem;
      font-family: var(--sans);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 20px;
      border: 1px solid transparent;
      transition: 0.4s;
      font-weight: 600;
    }

    .nav-links a:hover, .nav-active {
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 4px;
    }

    .menu-main-btn {
      background: var(--gold);
      color: white !important;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3);
    }

    /* --- Hero Section --- */
    .hero {
      height: 85vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('cafe-bg.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--white);
    }

    .hero-content h1 { 
      font-size: clamp(2rem, 6vw, 3.5rem); 
      margin-bottom: 15px; 
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
    }

    /* --- Menu Section --- */
    .menu-section { padding: 100px 0; background: var(--white); }
    .section-header { text-align: center; margin-bottom: 60px; }
    
    .section-header h2 {
      font-size: 2.4rem;
      letter-spacing: 4px;
      position: relative;
      display: inline-block;
      padding: 0 40px 15px 40px;
    }

    .section-header h2::before, 
    .section-header h2::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 1px;
    }

    .section-header h2::before { top: -10px; background: var(--gold); }
    .section-header h2::after { bottom: 0; background: var(--gold); }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    .menu-card {
      padding: 35px;
      background: #fdfdfd;
      border-left: 3px solid var(--gold); 
      border: 1px solid #eee;
      transition: all 0.5s;
      opacity: 0;
      transform: translateY(30px);
    }
    
    .menu-card.reveal { opacity: 1; transform: translateY(0); }

    .menu-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
    }

    .item-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; }
    .price { color: var(--gold); }
    .desc { font-size: 0.9rem; color: #666; }

    /* --- About --- */
    .about-section { padding: 100px 0; text-align: center; }

    /* --- Footer --- */
    .footer { 
      padding: 60px 0; 
      background: #151515; 
      color: rgba(255,255,255,0.3); 
      text-align: center; 
    }
    .footer span.gold-text { color: var(--gold); }

  </style>
</head>

<body>

<nav class="navbar">
  <div class="logo">SAMUNDRA <span>CAFÉ</span></div>
</nav>

<header class="hero">
  <div class="hero-content">
    
    <!-- ✅ FIXED TEXT -->
    <p style="letter-spacing: 8px; color: #ffffff; margin-bottom: 15px; text-shadow: 2px 2px 8px rgba(0,0,0,0.8);">
      HIMALAYAN SOUL
    </p>

    <h1>純粋なヒマラヤの一滴、<br>京都の静寂と共に。</h1>
  </div>
</header>

</body>
</html>
